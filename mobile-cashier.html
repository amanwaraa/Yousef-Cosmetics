<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>كاشير الجوال</title><meta name="theme-color" content="#17479C"><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');:root{--p:#17479C;--s:#05BAE4;--bg:#eef6ff;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbeafe;--ok:#16a34a;--danger:#dc2626;--shadow:0 18px 48px rgba(15,23,42,.12)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:linear-gradient(180deg,#f8fbff,#edf6ff);font-family:Cairo,system-ui,sans-serif;color:var(--text)}button,input,select{font:inherit}.hidden{display:none!important}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:10px 12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:44px;height:44px;border-radius:18px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;display:grid;place-items:center;font-weight:950}.brand h1{font-size:17px;margin:0}.status{font-size:12px;color:var(--muted);font-weight:800}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--danger);margin-left:5px}.dot.ok{background:var(--ok)}.iconBtn{position:relative;width:48px;height:48px;border:0;border-radius:18px;background:#eaf4ff;color:var(--p);display:grid;place-items:center}.badge{position:absolute;top:-6px;left:-6px;background:#0f172a;color:#fff;border:2px solid #fff;border-radius:999px;min-width:23px;height:23px;font-size:11px;font-weight:900;display:grid;place-items:center}.main{max-width:780px;margin:auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}.pair{min-height:calc(100dvh - 66px);display:grid;place-items:center;padding:14px}.pairBox{width:min(620px,100%);background:#fff;border-radius:30px;padding:18px;border:1px solid var(--line);box-shadow:var(--shadow);text-align:center}.pairBox h2{margin:0 0 8px;font-size:24px}.pairBox p{color:var(--muted);font-weight:800;line-height:1.7}.codeRow{display:grid;grid-template-columns:1fr auto;gap:8px}.codeInput{height:52px;border:1px solid var(--line);border-radius:18px;padding:0 12px;direction:ltr;text-align:left;font-family:monospace;font-size:12px;white-space:nowrap;overflow:auto}.btn{border:0;border-radius:17px;min-height:48px;padding:10px 14px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.light{background:#eef6ff;color:var(--p);border:1px solid var(--line)}.btn.red{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.btn.ok{background:#dcfce7;color:#14532d}.btn.block{width:100%;margin-top:8px}.scanOverlay{position:fixed;inset:0;background:#020617;z-index:80;display:flex;flex-direction:column}.scanHead{height:64px;background:rgba(2,6,23,.9);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px}.readerWrap{position:relative;flex:1;display:grid;place-items:center;overflow:hidden}.readerWrap #reader{width:100%;max-width:760px}.scanFrame{position:absolute;width:min(90vw,560px);height:min(45vh,290px);border:3px solid #22c55e;border-radius:30px;box-shadow:0 0 0 999px rgba(0,0,0,.42);pointer-events:none}.scanFrame:after{content:"";position:absolute;left:20px;right:20px;top:20px;height:4px;border-radius:99px;background:#22c55e;box-shadow:0 0 18px #22c55e;animation:scan .85s linear infinite}@keyframes scan{0%{top:20px}50%{top:calc(100% - 24px)}100%{top:20px}}.camFoot{position:absolute;left:12px;right:12px;bottom:12px;background:rgba(255,255,255,.94);border-radius:24px;padding:12px;text-align:center;font-weight:900}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.cartList{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:20px;padding:10px;background:#fff}.itemTop{display:flex;gap:10px;align-items:center}.pic{width:54px;height:54px;border-radius:16px;background:#eef6ff;overflow:hidden;display:grid;place-items:center;color:var(--p)}.pic img{width:100%;height:100%;object-fit:cover}.item b{font-size:14px}.item small{color:var(--muted)}.ctrl{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:8px}.ctrl input,.ctrl select,.formGrid input,.formGrid select{height:42px;border:1px solid var(--line);border-radius:14px;padding:0 8px;min-width:0}.total{display:flex;justify-content:space-between;background:#ecfdf5;border:1px solid #bbf7d0;border-radius:18px;padding:11px 13px;font-weight:950}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:grid;gap:5px}.field label{font-size:12px;color:var(--muted);font-weight:900}.full{grid-column:1/-1}.toast{position:fixed;top:78px;left:12px;right:12px;background:#0f172a;color:#fff;border-radius:18px;padding:12px;text-align:center;font-weight:900;z-index:90}.productGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.prodBtn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:18px;padding:10px;display:grid;gap:5px;text-align:center}.prodBtn .pic{width:100%;height:64px}.search{width:100%;height:46px;border:1px solid var(--line);border-radius:16px;padding:0 12px;margin-bottom:8px}@media(max-width:480px){.main{padding:10px}.formGrid{grid-template-columns:1fr 1fr}.ctrl{grid-template-columns:1fr 1fr}.ctrl .del{grid-column:1/-1}.productGrid{grid-template-columns:repeat(2,1fr)}}
</style></head><body><header class="top"><div class="brand"><div class="logo">₪</div><div><h1>كاشير الجوال</h1><div class="status"><span id="dot" class="dot"></span><span id="stateText">غير مربوط</span></div></div></div><div><button class="iconBtn" onclick="scrollCart()"><span id="cartCount" class="badge">0</span>🛒</button></div></header><section id="pairScreen" class="pair"><div class="pairBox"><h2>ربط بالكاشير</h2><p>الصق رمز الاتصال من صفحة الكاشير، ثم انسخ كود الجواب وضعه في الكاشير.</p><div class="codeRow"><input id="offerText" class="codeInput" placeholder="رمز الاتصال"><button class="btn light" onclick="pasteOffer()">لصق</button></div><button class="btn block" onclick="createAnswer()">إنشاء كود الجواب</button><div id="answerArea" class="hidden"><div class="codeRow" style="margin-top:8px"><input id="answerText" class="codeInput" readonly><button class="btn ok" onclick="copyAnswer()">نسخ</button></div></div><button class="btn red block" onclick="resetPair()">بدء ربط جديد</button></div></section><main id="home" class="main hidden"><section class="card"><div class="toolbar"><button class="btn" onclick="openCamera()">فتح الكاميرا</button><button class="btn light" onclick="requestSync()">تحديث</button><button class="btn red" onclick="clearCart()">تفريغ السلة</button></div><input id="manualCode" class="search" placeholder="باركود يدوي" style="margin-top:10px" onkeydown="if(event.key==='Enter')manualScan()"></section><section id="cartCard" class="card"><h2>السلة</h2><div id="cartItems" class="cartList"></div><div class="total"><span>الإجمالي</span><b id="cartTotal">0</b></div></section><section class="card"><h2>إنشاء فاتورة</h2><div class="formGrid"><div class="field full"><label>اسم العميل</label><input id="customerName" oninput="pushMeta()"></div><div class="field"><label>رقم الجوال</label><input id="phone" oninput="pushMeta()"></div><div class="field"><label>المدفوع</label><input id="payAmount" type="number" oninput="pushMeta()"></div><div class="field full"><label>الحساب</label><select id="accountId" onchange="pushMeta()"></select></div></div><button class="btn block" onclick="checkout()">إنشاء الفاتورة</button></section><section class="card"><h2>المنتجات</h2><input id="productSearch" class="search" placeholder="بحث" oninput="renderProducts()"><div id="products" class="productGrid"></div></section></main><div id="cameraModal" class="scanOverlay hidden"><div class="scanHead"><b>قارئ الباركود</b><button class="btn red" onclick="closeCamera()">إغلاق</button></div><div class="readerWrap"><div id="reader"></div><div class="scanFrame"></div><div id="camFoot" class="camFoot">جاري تجهيز الكاميرا</div></div></div><div id="toast" class="toast hidden"></div><script>
let pc=null,channel=null,qr=null,cameraRunning=false,cart=[],products=[],accounts=[],last='',lastTime=0;const $=id=>document.getElementById(id);function toast(t){$('toast').textContent=t;$('toast').classList.remove('hidden');clearTimeout($('toast')._t);$('toast')._t=setTimeout(()=>$('toast').classList.add('hidden'),2200)}function setState(t,ok){$('stateText').textContent=t;$('dot').classList.toggle('ok',!!ok)}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function money(n){return Number(n||0).toLocaleString('en-US',{maximumFractionDigits:2})}function send(o){try{if(channel&&channel.readyState==='open')channel.send(JSON.stringify(o))}catch(e){}}function b64(bytes){let bin='';for(let i=0;i<bytes.length;i+=0x8000)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+0x8000));return btoa(bin)}function bytes(s){const bin=atob(s),a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}async function pack(o){const raw=new TextEncoder().encode(JSON.stringify(o));try{if(!CompressionStream)throw 0;const cs=new CompressionStream('gzip'),w=cs.writable.getWriter();w.write(raw);w.close();const buf=await new Response(cs.readable).arrayBuffer();return 'GZ:'+b64(new Uint8Array(buf))}catch(e){return 'B64:'+btoa(unescape(encodeURIComponent(JSON.stringify(o))))}}async function unpack(s){s=String(s||'').trim();if(s.startsWith('GZ:')){const ds=new DecompressionStream('gzip'),w=ds.writable.getWriter();w.write(bytes(s.slice(3)));w.close();return JSON.parse(await new Response(ds.readable).text())}if(s.startsWith('B64:'))s=s.slice(4);return JSON.parse(decodeURIComponent(escape(atob(s))))}function waitIce(peer){return new Promise(res=>{if(peer.iceGatheringState==='complete')return res();peer.onicegatheringstatechange=()=>{if(peer.iceGatheringState==='complete')res()};setTimeout(res,4200)})}async function createAnswer(){try{const offer=await unpack($('offerText').value.trim());try{channel&&channel.close();pc&&pc.close()}catch(e){}pc=new RTCPeerConnection({iceServers:[]});pc.ondatachannel=e=>setupChannel(e.channel);pc.onconnectionstatechange=()=>{if(pc.connectionState==='connected')setState('متصل',true);else if(['failed','disconnected'].includes(pc.connectionState))setState('انقطع الاتصال',false)};await pc.setRemoteDescription(offer);const ans=await pc.createAnswer();await pc.setLocalDescription(ans);await waitIce(pc);$('answerText').value=await pack(pc.localDescription);$('answerArea').classList.remove('hidden');toast('انسخ كود الجواب وضعه في الكاشير')}catch(e){toast('رمز الاتصال غير صحيح')}}function setupChannel(ch){channel=ch;channel.onopen=()=>{setState('متصل',true);$('pairScreen').classList.add('hidden');$('home').classList.remove('hidden');toast('تم الربط');requestSync();setTimeout(openCamera,600)};channel.onclose=()=>setState('انقطع الاتصال',false);channel.onmessage=e=>{let m={};try{m=JSON.parse(e.data)}catch(_){}if(m.type==='products'){products=m.items||[];if(m.meta)applyMeta(m.meta);renderProducts()}if(m.type==='cart'){cart=m.items||[];if(m.meta)applyMeta(m.meta);renderCart(m.total)}if(m.type==='meta')applyMeta(m.meta||{});if(m.type==='miss')toast('المنتج غير موجود: '+m.code);if(m.type==='notice')toast(m.message||'تنبيه')}}function pasteOffer(){navigator.clipboard.readText().then(t=>$('offerText').value=t).catch(()=>toast('الصق يدويًا'))}function copyAnswer(){$('answerText').select();document.execCommand('copy');toast('تم النسخ')}function resetPair(){try{channel&&channel.close();pc&&pc.close()}catch(e){}location.reload()}function requestSync(){send({type:'products:get'});send({type:'cart:get'});send({type:'meta:get'})}function applyMeta(meta){if(meta.accounts){accounts=meta.accounts;renderAccounts()}if(meta.customerName!==undefined)$('customerName').value=meta.customerName||'';if(meta.phone!==undefined)$('phone').value=meta.phone||'';if(meta.payAmount!==undefined)$('payAmount').value=meta.payAmount||'';if(meta.accountId!==undefined)$('accountId').value=meta.accountId||''}function renderAccounts(){const old=$('accountId').value;$('accountId').innerHTML=accounts.map(a=>`<option value="${esc(a.id)}">${esc(a.name)}</option>`).join('');if(old)$('accountId').value=old}function productPic(p){return p.imageUrl?`<img src="${esc(p.imageUrl)}" onerror="this.outerHTML='📦'">`:'📦'}function renderProducts(){let q=$('productSearch').value.toLowerCase();let arr=products.filter(p=>!q||(p.name+' '+p.barcode).toLowerCase().includes(q)).slice(0,40);$('products').innerHTML=arr.map(p=>`<button class="prodBtn" onclick="scanCode('${esc(p.barcode||p.id)}')"><div class="pic">${productPic(p)}</div><b>${esc(p.name)}</b><small>${money(p.price)}</small></button>`).join('')||'<div class="empty">لا توجد منتجات</div>'}function renderCart(total){$('cartCount').textContent=cart.length;$('cartItems').innerHTML=cart.length?cart.map((it,i)=>`<div class="item"><div class="itemTop"><div class="pic">${productPic(it)}</div><div><b>${esc(it.name)}</b><br><small>${it.saleMode==='unit'?'وحدة':'قطعة'}</small></div></div><div class="ctrl"><select onchange="send({type:'cart:mode',idx:${i},mode:this.value})"><option value="piece" ${it.saleMode==='piece'?'selected':''}>قطعة</option><option value="unit" ${it.saleMode==='unit'?'selected':''} ${it.unitPieces>0?'':'disabled'}>وحدة</option></select><input type="number" value="${it.quantity}" onchange="send({type:'cart:qty',idx:${i},qty:this.value})"><input type="number" value="${it.price}" onchange="send({type:'cart:price',idx:${i},price:this.value})"><button class="btn red del" onclick="send({type:'cart:delete',idx:${i}})">حذف</button></div></div>`).join(''):'<div class="empty">السلة فارغة</div>';$('cartTotal').textContent=money(total||cart.reduce((s,i)=>s+Number(i.quantity||0)*Number(i.price||0),0))}function scanCode(code){if(!code)return;send({type:'scan',code});$('last')&&(last.textContent=code)}function manualScan(){scanCode($('manualCode').value.trim());$('manualCode').value=''}function clearCart(){send({type:'cart:clear'})}function pushMeta(){send({type:'meta:update',meta:{customerName:$('customerName').value,phone:$('phone').value,payAmount:$('payAmount').value,accountId:$('accountId').value}})}function checkout(){send({type:'checkout',meta:{customerName:$('customerName').value,phone:$('phone').value,payAmount:$('payAmount').value,accountId:$('accountId').value}})}function scrollCart(){$('cartCard').scrollIntoView({behavior:'smooth'})}async function openCamera(){if(cameraRunning)return;$('cameraModal').classList.remove('hidden');try{qr=new Html5Qrcode('reader',false);const cfg={fps:60,qrbox:(w,h)=>({width:Math.min(w*.9,580),height:Math.min(h*.46,270)}),aspectRatio:1.777,disableFlip:false,experimentalFeatures:{useBarCodeDetectorIfSupported:true}};await qr.start({facingMode:{exact:'environment'}},cfg,handleScan,()=>{}).catch(()=>qr.start({facingMode:'environment'},cfg,handleScan,()=>{}));cameraRunning=true;$('camFoot').innerHTML='وجّه الكاميرا نحو الباركود'}catch(e){$('camFoot').innerHTML='تعذر فتح الكاميرا. افتح عبر HTTPS أو استخدم الإدخال اليدوي'}}function handleScan(v){let now=Date.now();if(!v||v===last&&now-lastTime<1200)return;last=v;lastTime=now;scanCode(v);toast('تمت القراءة: '+v)}function closeCamera(){try{qr&&qr.stop()}catch(e){}try{qr&&qr.clear()}catch(e){}qr=null;cameraRunning=false;$('reader').innerHTML='';$('cameraModal').classList.add('hidden')}document.addEventListener('DOMContentLoaded',()=>renderCart(0));
</script></body></html>
