<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>نظام إدارة المبيعات</title>
  <meta name="theme-color" content="#17479C">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div id="loginLogo" class="login-logo"></div>
      <h1>نظام إدارة المبيعات</h1>
      <p>فواتير، عملاء، حسابات، ديون، دفعات، منتجات، ومزامنة تلقائية.</p>
      <form id="loginForm" class="login-form">
        <label>كلمة المرور
          <input id="loginPassword" type="password" inputmode="numeric" autocomplete="current-password" required>
        </label>
        <button class="btn primary" type="submit">دخول</button>
      </form>
    </div>
  </div>

  <div id="appShell" class="app-shell hidden">
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div id="brandLogo" class="brand-logo"></div>
        <div class="brand-text">
          <h1 id="brandName">نظام إدارة المبيعات</h1>
          <p>Local First + Firebase Sync</p>
        </div>
      </div>
      <nav id="sideNav" class="side-nav"></nav>
      <div class="sidebar-footer">
        <button id="installBtn" class="btn ghost full-width hidden" type="button">تثبيت التطبيق</button>
        <button id="logoutBtn" class="btn ghost full-width" type="button">تسجيل خروج</button>
      </div>
    </aside>

    <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn mobile-only" type="button" aria-label="القائمة"></button>
        <div class="page-heading">
          <h2 id="pageTitle">الرئيسية</h2>
          <p id="pageSubtitle">ملخص النظام</p>
        </div>
        <div class="top-actions">
          <span id="syncStatus" class="sync-status"></span>
          <button id="themeBtn" class="icon-btn" type="button" aria-label="الوضع الليلي"></button>
          <button id="syncBtn" class="btn ghost" type="button"><span id="syncIcon"></span><span class="hide-sm">مزامنة</span></button>
        </div>
      </header>
      <section id="pageHost" class="page-host"></section>
    </main>

    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

  <div id="toastHost" class="toast-host"></div>

  <script src="https://unpkg.com/@zxing/browser@latest/umd/index.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
